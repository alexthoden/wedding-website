<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Floral Template</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f7f2f5;
        font-family: "Georgia", serif;
    }

    .canvas {
        width: 900px;
        margin: 40px auto;
        padding: 40px;
        border-radius: 20px;
        background: linear-gradient(135deg, #fde2e4 0%, #fff1d6 40%, #e8f3ff 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    svg {
        position: absolute;
        pointer-events: none;
        opacity: 0.9;
    }

    /* Floral placements */
    #floral-top-left {
        top: -40px;
        left: -40px;
        width: 350px;
    }

    #floral-top-right {
        top: -40px;
        right: -40px;
        width: 350px;
    }

    #floral-bottom-left {
        bottom: -40px;
        left: -40px;
        width: 350px;
    }
</style>
</head>
<body>

<div class="canvas">

    <!-- TOP LEFT FLORAL CLUSTER -->
    <svg id="floral-top-left" viewBox="0 0 300 300">
        <defs>
            <radialGradient id="rose1" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffb6c1" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#ffb6c1" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="leaf1" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#b4d8b4" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#b4d8b4" stop-opacity="0"/>
            </radialGradient>
        </defs>

        <circle cx="120" cy="120" r="80" fill="url(#rose1)"/>
        <circle cx="200" cy="160" r="60" fill="url(#rose1)"/>
        <ellipse cx="80" cy="200" rx="70" ry="40" fill="url(#leaf1)"/>
        <ellipse cx="160" cy="60" rx="60" ry="30" fill="url(#leaf1)"/>
    </svg>

    <!-- TOP RIGHT FLORAL CLUSTER -->
    <svg id="floral-top-right" viewBox="0 0 300 300">
        <defs>
            <radialGradient id="rose2" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffc7b2" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#ffc7b2" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="leaf2" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#c7e6c7" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#c7e6c7" stop-opacity="0"/>
            </radialGradient>
        </defs>

        <circle cx="150" cy="120" r="80" fill="url(#rose2)"/>
        <circle cx="220" cy="180" r="60" fill="url(#rose2)"/>
        <ellipse cx="100" cy="200" rx="70" ry="40" fill="url(#leaf2)"/>
        <ellipse cx="200" cy="60" rx="60" ry="30" fill="url(#leaf2)"/>
    </svg>

    <!-- BOTTOM LEFT FLORAL CLUSTER -->
    <svg id="floral-bottom-left" viewBox="0 0 300 300">
        <defs>
            <radialGradient id="rose3" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#f7a8c4" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#f7a8c4" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="leaf3" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#a8d8a8" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#a8d8a8" stop-opacity="0"/>
            </radialGradient>
        </defs>

        <circle cx="120" cy="160" r="80" fill="url(#rose3)"/>
        <circle cx="200" cy="200" r="60" fill="url(#rose3)"/>
        <ellipse cx="80" cy="80" rx="70" ry="40" fill="url(#leaf3)"/>
        <ellipse cx="160" cy="240" rx="60" ry="30" fill="url(#leaf3)"/>
    </svg>

</div>

</body>
</html>
