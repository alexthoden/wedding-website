name: Keep Supabase Awake

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive request
        run: |
          # This command just pings the table to keep it active.
          # The http_code is printed to the log for basic success/fail feedback.
          curl -s -o /dev/null -w "Keep-alive request sent. HTTP Status: %{http_code}\n" \
          "https://tireiqhsgftbsgwnauob.supabase.co/rest/v1/rsvp_responses" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Verify Correct Database
        run: |
          echo "Verifying that the database schema contains the 'rsvp_responses' table..."
          
          # Fetch the API schema and use grep to check for the table name.
          # The '-q' flag makes grep "quiet" and it will exit with a non-zero status code (failing the step)
          # if the text is not found.
          curl -s "https://tireiqhsgftbsgwnauob.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            | grep -q '"path": "/rsvp_responses"'

          echo "✅ Verification successful. The 'rsvp_responses' table was found in the API schema."

