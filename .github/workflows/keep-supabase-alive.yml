name: Keep Supabase Awake

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive request
        run: |
          # This command just pings the table to keep it active.
          # The http_code is printed to the log for basic success/fail feedback.
          curl -s -o /dev/null -w "Keep-alive request sent. HTTP Status: %{http_code}\n" \
          "https://tireiqhsgftbsgwnauob.supabase.co/rest/v1/rsvp_responses" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

      - name: DEBUG - Inspect API Schema
        run: |
          echo "Fetching the API schema to inspect its content..."
          
          # This command will now print the full JSON schema from the API to the log.
          # We remove the pipe to grep and the '-s' flag to make the output visible.
          curl "https://tireiqhsgftbsgwnauob.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"



          echo "✅ Verification successful. The 'rsvp_responses' table was found in the API schema."

